<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>متجر التيشرتات - عرض المنتجات</title>
    <style>
        :root { --primary: #0f172a; --accent: #ef4444; --success: #22c55e; }
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .main-img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .thumb-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .thumb-list img { width: 70px; height: 70px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .thumb-list img.active { border-color: var(--primary); }
        .color-grid { display: flex; gap: 10px; margin-top: 10px; }
        .btn-order { background: var(--success); color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="gallery">
        <!-- الصورة الرئيسية -->
        <img src="1000003814_2.png" id="mainImg" class="main-img">
        
        <!-- المصغرات (اضغط لتغيير اللون) -->
        <div class="thumb-list">
            <img src="1000003814_2.png" class="active" onclick="changeProduct(this, 'أسود')">
            <img src="1000003808_2.png" onclick="changeProduct(this, 'أبيض')">
            <img src="1000003809_2.png" onclick="changeProduct(this, 'أزرق غامق')">
            <img src="1000003810_2.png" onclick="changeProduct(this, 'بنفسجي')">
            <img src="1000003811_2.png" onclick="changeProduct(this, 'نيلي/أزرق')">
            <img src="1000003812_2.png" onclick="changeProduct(this, 'عنابي')">
            <img src="1000003813_2.png" onclick="changeProduct(this, 'سماوي')">
        </div>
    </div>

    <div style="margin: 20px 0;">
        <label>إختر اللون:</label>
        <div id="colorDisplay" style="font-weight: bold; margin-bottom: 10px;">اللون المحدد: أسود</div>
    </div>

    <button class="btn-order" onclick="submitOrder()">اطلب الآن عبر واتساب</button>
</div>

<script>
    let selectedColor = "أسود";

    function changeProduct(imgEl, color) {
        // تغيير الصورة
        document.getElementById('mainImg').src = imgEl.src;
        
        // تحديث النص
        selectedColor = color;
        document.getElementById('colorDisplay').innerText = "اللون المحدد: " + color;
        
        // تحديث الحدود للصورة المختارة
        document.querySelectorAll('.thumb-list img').forEach(i => i.classList.remove('active'));
        imgEl.classList.add('active');
    }

    function submitOrder() {
        const phone = "213661000000"; // ضع رقمك هنا
        const msg = `مرحباً، أريد طلب تيشرت بلون: ${selectedColor}`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
